version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tensortonic_redis_prod
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tensortonic_backend_prod
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - JUDGE0_URL=${JUDGE0_URL}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: tensortonic_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

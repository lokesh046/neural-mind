name: Keep Render App Alive

on:
  schedule:
    # Runs every 2 minutes (Note: GitHub Actions enforces a 5-minute minimum limit)
    - cron: '*/2 * * * *'
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        # Pings the actual Render backend URL to keep it awake
        run: curl -s https://neural-mind.onrender.com > /dev/null
